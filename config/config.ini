[Settings]
template_file = demo.txt
sources_file = config/sources.txt
output_dir = output

[SpeedTest]
# 测速超时 5 秒 (快速判断死活，不浪费时间)
timeout = 5
# 每个频道最多抓取 30 个源进行测速 (覆盖更广)
max_sources_per_channel = 30
# 并发线程 20 (保证速度)
threads = 20
# 最低速度要求 50 KB/s (只要不卡就行)
min_speed = 50

[Filter]
min_resolution = 720
# ★ 核心修改：最大保留数量设为 99，相当于“不限制”，只要合格的源全都要！
max_keep_per_channel = 99

[Output]
mark_invalid = false
