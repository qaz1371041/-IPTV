name: IPTV Update

on:
  schedule:
    - cron: '0 18 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: pip install --quiet requests urllib3

      - name: Restore speedtest cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: iptv-cache-${{ github.run_id }}
          restore-keys: |
            iptv-cache-

      - name: Run IPTV Engine
        run: python main.py

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iptv-output
          path: output/
          retention-days: 7

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true

      - name: Save cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: cache/
          key: iptv-cache-${{ github.run_id }}
