`yamlname: Update IPTV
on:
schedule:
- cron: '0 22 * * *'
- cron: '0 4 * * *'
- cron: '0 10 * * *'
- cron: '0 16 * * *'
workflow_dispatch:
permissions:
contents: write
jobs:
run:
runs-on: ubuntu-latest
timeout-minutes: 130
steps:
- uses: actions/checkout@v4
with:
fetch-depth: 0
- uses: actions/setup-python@v5
with:
python-version: '3.11'
- run: |
pip install requests
sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
- name: Run
env:
NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
run: python main.py
- name: Push
run: |
git config user.name "bot"
git config user.email "mailto:bot@users.noreply.github.com"
echo "pycache/" >> .gitignore
echo "*.pyc" >> .gitignore
git rm -r --cached pycache/ 2>/dev/null || true
git add -A
git diff --cached --quiet || git commit -m "🔄 $(date -u '+%Y-%m-%d %H:%M UTC')"
git pull --rebase origin main || true
git push --force
